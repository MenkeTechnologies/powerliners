name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: |
          cargo build --release --locked --target ${{ matrix.target }} \
            --bin powerline \
            --bin powerline-daemon \
            --bin powerline-config \
            --bin powerline-render \
            --bin powerline-lint

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          for b in powerline powerline-daemon powerline-config powerline-render powerline-lint; do
            strip "$b" 2>/dev/null || true
          done
          tar czf ../../../powerliners-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            powerline powerline-daemon powerline-config powerline-render powerline-lint
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: powerliners-${{ matrix.target }}
          path: powerliners-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz

  homebrew:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        shell: bash
        run: |
          for f in artifacts/*.tar.gz; do
            base=$(basename "$f")
            sum=$(sha256sum "$f" | awk '{print $1}')
            key=$(echo "$base" | sed 's/powerliners-v[^-]*-//; s/\.tar\.gz//; s/-/_/g; s/\./_/g')
            echo "${key}=${sum}" >> "$GITHUB_OUTPUT"
          done

      - uses: actions/checkout@v4
        with:
          repository: MenkeTechnologies/homebrew-menketech
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          SHA_ARM_MACOS: ${{ steps.sha.outputs.aarch64_apple_darwin }}
          SHA_X86_LINUX: ${{ steps.sha.outputs.x86_64_unknown_linux_gnu }}
        run: |
          VERSION="${VERSION#v}"
          cat > tap/Formula/powerliners.rb <<FORMULA
          class Powerliners < Formula
            desc "1:1 Rust port of powerline-status — daemon + client + config + render + lint"
            homepage "https://github.com/MenkeTechnologies/powerliners"
            license "MIT"
            version "${VERSION}"

            on_macos do
            on_arm do
              url "https://github.com/MenkeTechnologies/powerliners/releases/download/v${VERSION}/powerliners-v${VERSION}-aarch64-apple-darwin.tar.gz"
              sha256 "${SHA_ARM_MACOS}"
            end
            # x86_64 macOS not supported — see release.yml matrix.
            end

            on_linux do
            on_intel do
              url "https://github.com/MenkeTechnologies/powerliners/releases/download/v${VERSION}/powerliners-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_X86_LINUX}"
            end
            end

            def install
              bin.install "powerline"
              bin.install "powerline-daemon"
              bin.install "powerline-config"
              bin.install "powerline-render"
              bin.install "powerline-lint"
            end

            test do
              assert_match "ext is required", shell_output("#{bin}/powerline-render 2>&1", 2)
            end
          end
          FORMULA

      - name: Push formula update
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/powerliners.rb
          if git diff --cached --quiet; then
            echo "no changes — formula already up to date"
            exit 0
          fi
          git commit -m "powerliners: bump to ${{ github.ref_name }}"
          git push
